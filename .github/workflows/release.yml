name: Build & Publish

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  check:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Typprüfung
        run: npm run typecheck

  build-linux:
    name: Build Linux (.deb)
    needs: [check]
    if: "!contains(github.ref_name, '-win')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm install

      - name: App bauen
        run: npx electron-vite build

      - name: Linux .deb bauen
        run: npx electron-builder --linux deb --publish never

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: |
            release/*.deb
            release/latest-linux.yml

  build-windows:
    name: Build Windows (.exe)
    needs: [check]
    if: "!contains(github.ref_name, '-linux')"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm install

      - name: App bauen
        run: npx electron-vite build

      - name: Zertifikat einrichten
        env:
          CSC_LINK_BASE64: ${{ secrets.CSC_LINK_BASE64 }}
        run: |
          $bytes = [Convert]::FromBase64String($env:CSC_LINK_BASE64)
          [IO.File]::WriteAllBytes("nmailclient-cert.pfx", $bytes)

      - name: Windows Installer bauen
        env:
          CSC_LINK: nmailclient-cert.pfx
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npx electron-builder --win --publish never

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml

  release:
    name: GitHub Release erstellen
    needs: [build-linux, build-windows]
    if: always() && (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped') && (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') && (needs.build-linux.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Changelog-Abschnitt extrahieren
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Release erstellen und Assets hochladen
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: ${{ steps.changelog.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
