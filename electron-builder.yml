appId: at.or.neuhaus.n-mailclient
productName: N-MailClient
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
win:
  target:
    - nsis
  icon: build/icon.png
  verifyUpdateCodeSignature: false
nsis:
  artifactName: ${name}-Setup-${version}.${ext}
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  allowElevation: true
linux:
  target:
    - deb
  icon: build/icon.png
  category: Network
  maintainer: Rene Neuhaus <app@neuhaus.or.at>
publish:
  - provider: github
    owner: lunasans
    repo: N-MailClient
