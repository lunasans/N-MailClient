# LibreTranslate für N-MailClient (Mail-Übersetzung)
#
# Start:   docker compose up -d
# Logs:    docker compose logs -f
# Test:    curl http://localhost:5000/languages
#
# In N-MailClient: Einstellungen → Übersetzung → Server-URL = http://<host>:5000
# (lokal: http://localhost:5000). Ohne API-Key lassen, wenn der Dienst nur intern
# erreichbar ist; sonst unten die API-Key-Zeilen aktivieren.

services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: libretranslate
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Nur benötigte Sprachmodelle laden (spart RAM/Startzeit). Für mehr Sprachen
      # ergänzen, z. B. "en,de,fr,es", oder die Zeile entfernen für alle.
      LT_LOAD_ONLY: "en,de"
      # Zeichenlimit pro Anfrage hochsetzen (Standard 5000 ist für Mails oft zu klein).
      LT_CHAR_LIMIT: "20000"
      # Modelle beim Start nicht automatisch aktualisieren (schnellerer Start).
      LT_UPDATE_MODELS: "false"
      # Optional: Web-Oberfläche abschalten, wenn nur die API genutzt wird.
      # LT_DISABLE_WEB_UI: "true"
      #
      # --- Optionaler API-Key-Schutz -------------------------------------------
      # 1) Hier aktivieren:
      # LT_API_KEYS: "true"
      # 2) Container starten, dann einen Key anlegen:
      #    docker compose exec libretranslate ltmanage keys add 9999
      # 3) Den ausgegebenen Key in N-MailClient unter „API-Key" eintragen.
    volumes:
      # Heruntergeladene Sprachmodelle persistent halten (kein Re-Download).
      - lt-models:/home/libretranslate/.local
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/languages')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  lt-models:
    driver: local
